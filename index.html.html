  .btn { border: none; border-radius: 8px; padding: 12px 28px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.2s; }
  .btn-primary { background: linear-gradient(135deg, #0077b6, #00b4d8); color: white; }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-outline { background: transparent; border: 2px solid #0077b6; color: #0055a5; font-weight: 700; }
  .btn-outline:hover { border-color: #004e89; background: #dceefb; color: #004e89; }

  .tip-num { font-size: 28px; font-weight: 800; color: #90c4e4; margin-bottom: 6px; }
  .tip-title { font-size: 13px; font-weight: 700; color: #004e89; margin-bottom: 6px; }
  .tip-desc { font-size: 12px; color: #1e3a52; line-height: 1.5; font-weight: 500; }

  .red-flag-tag { display: inline-block; background: #fee2e2; color: #7f1d1d; border: 1px solid #b91c1c; border-radius: 4px; font-size: 11px; font-weight: 700; padding: 2px 8px; margin: 2px; }

  /* Footer */
  .site-footer { position: fixed; bottom: 0; left: 0; right: 0; background: #e8f2fa; border-top: 2px solid #90c4e4; padding: 10px 24px; display: flex; align-items: center; justify-content: center; gap: 8px; z-index: 100; }
  .site-footer span { font-size: 12px; color: #1e3a52; font-weight: 600; }
  .site-footer strong { color: #004e89; font-size: 12px; font-weight: 700; }
  .footer-divider { color: #90c4e4; font-weight: 700; }
</style>

              <li><strong>Malicious link URL</strong> where the real domain differs from visible text</li>
              <li><strong>Free email provider</strong> used for corporate communication</li>
              <li><strong>Suspicious country-code domains</strong> (.ru, .cn, .info)</li>
            </ul>
          </div>
        </div>
        <div class="card green-accent" style="padding:16px 20px;">
          <div class="tag-label green">💡 PRO TIP — Focus on Technical Indicators</div>
          <p style="font-size:13px;color:#0d1f2d;line-height:1.6;font-weight:500;">Tactics alone are not definitive proof. A legitimate email can be urgent. But a mismatched domain or malicious link URL is always a definitive technical indicator of phishing, regardless of the message tone.</p>
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-outline" onclick="prevSlide()">← Back</button>
        <button class="btn btn-primary" onclick="nextSlide()">Start Scenarios →</button>
      </div>
    </div>`;

  } else if (slide.type === 'quiz') {
    const qIdx = quizSlideMap[index];
    const sc = scenarios[qIdx];
    const fromClass = sc.from.suspicious ? 'suspicious' : '';
    const answered = answers[qIdx] !== null;

    const optionsHtml = sc.options.map((opt, i) => {
      let cls = '';
      if (answered) {
        if (i === sc.correct) cls = 'correct';
        else if (i === answers[qIdx]) cls = 'wrong';
      }
      return `<button class="option-btn ${cls}" ${answered ? 'disabled' : ''} onclick="selectAnswer(${qIdx}, ${i})">${String.fromCharCode(65+i)}. ${opt}</button>`;
    }).join('');

    const feedbackHtml = answered ? `
      <div class="feedback ${answers[qIdx] === sc.correct ? 'correct' : 'wrong'}" style="display:block">
        <div class="feedback-icon">${answers[qIdx] === sc.correct ? '✅' : '❌'}</div>
        <div class="feedback-title">${answers[qIdx] === sc.correct ? 'Correct! Well spotted.' : 'Not quite — let\'s review.'}</div>
        <div class="feedback-text">${sc.explanation}</div>
        <div style="margin-top:10px;"><strong style="color:#1e3a52;font-size:11px;text-transform:uppercase;letter-spacing:1px;">Red Flags in this email:</strong><br><div style="margin-top:6px;">${sc.redFlags.map(f => `<span class="red-flag-tag">${f}</span>`).join(' ')}</div></div>
      </div>` : '';

    html = `<div class="slide active">
      <div class="scenario-number">${slide.label}</div>
      <div class="scenario-question">${sc.question}</div>
      <div class="email-box">
        <div class="email-header">
          <div class="email-row"><span class="email-field">From:</span><span class="email-value ${fromClass}">${sc.from.label}</span></div>
          <div class="email-row"><span class="email-field">Subject:</span><span class="email-value">${sc.subject}</span></div>
          <div class="email-row"><span class="email-field">Date:</span><span class="email-value">${sc.date}</span></div>
        </div>
        <div class="email-body">${sc.body}</div>
      </div>
      <div class="options-grid">${optionsHtml}</div>
      ${feedbackHtml}
      <div class="btn-group">
        <button class="btn btn-outline" onclick="prevSlide()">← Back</button>
        ${answered ? `<button class="btn btn-primary" onclick="nextSlide()">${index === 6 ? 'See Results →' : 'Next Scenario →'}</button>` : ''}
      </div>
    </div>`;

  } else if (slide.type === 'info' && slide.content === 'tips') {
    html = `<div class="slide active info-slide">
      <div class="slide-header"><span class="slide-tag tip">${slide.tag}</span></div>
      <div class="slide-title">${slide.title}</div>
      <div class="tips-grid" style="margin:20px 0;">
        <div class="tip-card">
          <div class="tip-num">01</div>
          <div class="tip-title">Verify the Sender Domain</div>
          <div class="tip-desc">Legitimate companies always use their own official domain. A free email provider (gmail, yahoo) or a look-alike domain is an instant red flag.</div>
        </div>
        <div class="tip-card">
          <div class="tip-num">02</div>
          <div class="tip-title">Hover Before You Click</div>
          <div class="tip-desc">Always hover over links to preview the real URL. The visible text and the actual destination are often different in phishing emails.</div>
        </div>
        <div class="tip-card">
          <div class="tip-num">03</div>
          <div class="tip-title">Slow Down on Urgency</div>
          <div class="tip-desc">Attackers use pressure and secrecy to prevent you thinking clearly. A real IT team or manager will never penalise you for pausing to verify.</div>
        </div>
        <div class="tip-card">
          <div class="tip-num">04</div>
          <div class="tip-title">Verify Financial Requests Separately</div>
          <div class="tip-desc">Any request for a transfer or gift card purchase must be verbally confirmed via phone or in person — never by replying to the same email.</div>
        </div>
        <div class="tip-card" style="grid-column: 1 / -1;">
          <div class="tip-num">05</div>
          <div class="tip-title">Report — Don't Delete</div>
          <div class="tip-desc">Report suspected phishing to your IT Security team immediately. Do not delete the email — it may help protect your entire organisation. When in doubt, report it out.</div>
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-outline" onclick="prevSlide()">← Back</button>
        <button class="btn btn-primary" onclick="nextSlide()">Next →</button>
      </div>
    </div>`;

  } else if (slide.type === 'info' && slide.content === 'whattodo') {
    html = `<div class="slide active info-slide">
      <div class="slide-header"><span class="slide-tag warning">${slide.tag}</span></div>
      <div class="slide-title">${slide.title}</div>
      <div style="margin:20px 0;">
        <div class="two-col">
          <div class="card green-accent">
            <div class="tag-label green" style="margin-bottom:12px;">✅ DO — Act on These</div>
            <ul class="check-list">
              <li>Report using the <strong>"Report Phishing"</strong> button in Outlook</li>
              <li>Forward to <strong>security@yourcompany.com</strong></li>
              <li>Verify unusual requests by calling the sender directly</li>
              <li>Hover over every link before clicking to check the real URL</li>
              <li>Check the full sender email address — not just the display name</li>
              <li>Enable <strong>Multi-Factor Authentication (MFA)</strong> on all accounts</li>
            </ul>
          </div>
          <div class="card red-accent">
            <div class="tag-label red" style="margin-bottom:12px;">❌ DO NOT — Avoid These</div>
            <ul class="check-list">
              <li>Click links or open attachments in suspicious emails</li>
              <li>Enter credentials or OTPs on any unfamiliar page</li>
              <li>Wire money or purchase gift cards based on an email request</li>
              <li>Share passwords, PINs, or OTPs via email with anyone</li>
              <li>Ignore a suspicious email — always report it</li>
              <li>Assume a professional-looking email is automatically safe</li>
            </ul>
          </div>
        </div>
        <div class="card blue-accent" style="padding:16px 20px;">
          <div class="tag-label" style="color:#004e89;">📞 GOLDEN RULE — When In Doubt</div>
          <p style="font-size:13px;color:#0d1f2d;line-height:1.6;font-weight:500;">Pick up the phone. Call using a number you already know — never a number provided in the suspicious email itself. A real IT team or manager will never mind you pausing to verify.</p>
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-outline" onclick="prevSlide()">← Back</button>
        <button class="btn btn-primary" onclick="nextSlide()">Next →</button>
      </div>
    </div>`;

  } else if (slide.type === 'info' && slide.content === 'checklist') {
    html = `<div class="slide active info-slide">
      <div class="slide-header"><span class="slide-tag">${slide.tag}</span></div>
      <div class="slide-title">${slide.title}</div>
      <div style="margin:20px 0;">
        <p style="color:#0d1f2d;font-size:14px;line-height:1.7;margin-bottom:16px;font-weight:500;">Before acting on any email, run through this checklist. Always start with <span style="color:#b91c1c;font-weight:700;">CRITICAL</span> checks — they are definitive, unforgeable technical proof of phishing.</p>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <div style="display:grid;grid-template-columns:36px 1fr 90px;gap:10px;padding:8px 14px;border-radius:8px;background:linear-gradient(135deg,#0077b6,#00b4d8);">
            <span style="color:white;font-weight:800;font-size:12px;">#</span>
            <span style="color:white;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:1px;">Check</span>
            <span style="color:white;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:1px;text-align:center;">Priority</span>
          </div>
          <div style="display:grid;grid-template-columns:36px 1fr 90px;gap:10px;align-items:center;padding:10px 14px;background:#eef5fb;border-radius:8px;border:1px solid #b8d9f5;">
            <span style="color:#004e89;font-weight:800;font-size:14px;">1</span>
            <span style="font-size:13px;color:#0d1f2d;font-weight:500;">Is the sender domain exactly correct? (e.g., @techcorp.com — not @techcorp-support.net)</span>
            <span style="text-align:center;background:#fee2e2;color:#b91c1c;border:1px solid #f5c6c6;border-radius:4px;padding:3px 6px;font-size:10px;font-weight:700;letter-spacing:.5px;display:block;">CRITICAL</span>
          </div>
          <div style="display:grid;grid-template-columns:36px 1fr 90px;gap:10px;align-items:center;padding:10px 14px;background:#ffffff;border-radius:8px;border:1px solid #b8d9f5;">
            <span style="color:#004e89;font-weight:800;font-size:14px;">2</span>
            <span style="font-size:13px;color:#0d1f2d;font-weight:500;">Does the hover URL match the expected company domain?</span>
            <span style="text-align:center;background:#fee2e2;color:#b91c1c;border:1px solid #f5c6c6;border-radius:4px;padding:3px 6px;font-size:10px;font-weight:700;letter-spacing:.5px;display:block;">CRITICAL</span>
          </div>
          <div style="display:grid;grid-template-columns:36px 1fr 90px;gap:10px;align-items:center;padding:10px 14px;background:#eef5fb;border-radius:8px;border:1px solid #b8d9f5;">
            <span style="color:#004e89;font-weight:800;font-size:14px;">3</span>
            <span style="font-size:13px;color:#0d1f2d;font-weight:500;">Were you expecting this email or attachment?</span>
            <span style="text-align:center;background:#fff7e6;color:#b45309;border:1px solid #fcd34d;border-radius:4px;padding:3px 6px;font-size:10px;font-weight:700;letter-spacing:.5px;display:block;">HIGH</span>
          </div>
          <div style="display:grid;grid-template-columns:36px 1fr 90px;gap:10px;align-items:center;padding:10px 14px;background:#ffffff;border-radius:8px;border:1px solid #b8d9f5;">
            <span style="color:#004e89;font-weight:800;font-size:14px;">4</span>
            <span style="font-size:13px;color:#0d1f2d;font-weight:500;">Is there unusual urgency, fear, or pressure to act immediately?</span>
            <span style="text-align:center;background:#fff7e6;color:#b45309;border:1px solid #fcd34d;border-radius:4px;padding:3px 6px;font-size:10px;font-weight:700;letter-spacing:.5px;display:block;">HIGH</span>
          </div>
          <div style="display:grid;grid-template-columns:36px 1fr 90px;gap:10px;align-items:center;padding:10px 14px;background:#eef5fb;border-radius:8px;border:1px solid #b8d9f5;">
            <span style="color:#004e89;font-weight:800;font-size:14px;">5</span>
            <span style="font-size:13px;color:#0d1f2d;font-weight:500;">Is it requesting credentials, OTPs, financial data, or gift cards?</span>
            <span style="text-align:center;background:#fff7e6;color:#b45309;border:1px solid #fcd34d;border-radius:4px;padding:3px 6px;font-size:10px;font-weight:700;letter-spacing:.5px;display:block;">HIGH</span>
          </div>
          <div style="display:grid;grid-template-columns:36px 1fr 90px;gap:10px;align-items:center;padding:10px 14px;background:#ffffff;border-radius:8px;border:1px solid #b8d9f5;">
            <span style="color:#004e89;font-weight:800;font-size:14px;">6</span>
            <span style="font-size:13px;color:#0d1f2d;font-weight:500;">Are there spelling mistakes, grammar errors, or unusual formatting?</span>
            <span style="text-align:center;background:#eef5fb;color:#004e89;border:1px solid #90c4e4;border-radius:4px;padding:3px 6px;font-size:10px;font-weight:700;letter-spacing:.5px;display:block;">MEDIUM</span>
          </div>
          <div style="display:grid;grid-template-columns:36px 1fr 90px;gap:10px;align-items:center;padding:10px 14px;background:#eef5fb;border-radius:8px;border:1px solid #b8d9f5;">
            <span style="color:#004e89;font-weight:800;font-size:14px;">7</span>
            <span style="font-size:13px;color:#0d1f2d;font-weight:500;">Is the greeting generic ("Dear Customer") rather than your actual name?</span>
            <span style="text-align:center;background:#eef5fb;color:#004e89;border:1px solid #90c4e4;border-radius:4px;padding:3px 6px;font-size:10px;font-weight:700;letter-spacing:.5px;display:block;">MEDIUM</span>
          </div>
          <div style="display:grid;grid-template-columns:36px 1fr 90px;gap:10px;align-items:center;padding:10px 14px;background:#ffffff;border-radius:8px;border:1px solid #b8d9f5;">
            <span style="color:#004e89;font-weight:800;font-size:14px;">8</span>
            <span style="font-size:13px;color:#0d1f2d;font-weight:500;">Does the email have unexpected attachments (.zip / .exe / .docm)?</span>
            <span style="text-align:center;background:#fff7e6;color:#b45309;border:1px solid #fcd34d;border-radius:4px;padding:3px 6px;font-size:10px;font-weight:700;letter-spacing:.5px;display:block;">HIGH</span>
          </div>
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-outline" onclick="prevSlide()">← Back</button>
        <button class="btn btn-primary" onclick="nextSlide()">See My Score →</button>
      </div>
    </div>`;

  } else if (slide.type === 'score') {
    const score = answers.filter((a, i) => a === scenarios[i].correct).length;
    const pct = Math.round((score / 4) * 100);
    const deg = Math.round((pct / 100) * 360);
    let msg, sub;
    if (score === 4) { msg = "Outstanding! 🏆"; sub = "You correctly identified all four phishing attempts. You're a valuable line of defence for your organisation."; }
    else if (score === 3) { msg = "Great Work! 👍"; sub = "You identified 3 out of 4 phishing attempts. Review the scenario you missed to sharpen your skills."; }
    else if (score === 2) { msg = "Good Effort 🎯"; sub = "You identified 2 out of 4 phishing attempts. Review the explanations carefully and consider retaking the training."; }
    else { msg = "Keep Practising 📚"; sub = "Review the explanations for each scenario and retake this training to build your phishing awareness skills."; }

    const reviewItems = scenarios.map((sc, i) => {
      const pass = answers[i] === sc.correct;
      return `<div class="review-item ${pass ? 'pass' : 'fail'}">
        <div class="review-item-label">Scenario ${i+1} — ${pass ? '✅ Correct' : '❌ Missed'}</div>
        <div class="review-item-text">${pass ? 'Great — you spotted the key indicator.' : `Correct answer: ${sc.options[sc.correct]}`}</div>
      </div>`;
    }).join('');

    html = `<div class="slide active score-slide">
      <h2 style="color:#0d1f2d;margin-bottom:20px;">Training Complete!</h2>
      <div class="score-circle" style="--score-deg:${deg}deg">
        <div class="score-inner">
          <span class="score-number">${score}/4</span>
          <span class="score-label">${pct}%</span>
        </div>
      </div>
      <div class="score-message">${msg}</div>
      <div class="score-sub">${sub}</div>
      <div class="review-cards">${reviewItems}</div>
      <div class="btn-group center" style="margin-top:24px;">
        <button class="btn btn-outline" onclick="restartTraining()">🔄 Retake Training</button>
      </div>
    </div>`;
  }

  container.innerHTML = html;
  updateProgress();
}

function updateProgress() {
  const pct = (currentSlide / (slides.length - 1)) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  const labels = ['Introduction','What Is Phishing?','Tactics vs Indicators','Scenario 1','Scenario 2','Scenario 3','Scenario 4','Golden Rules','What To Do','Quick Reference','Your Results'];
  document.getElementById('progressLabel').textContent = labels[currentSlide] || '';
}

function nextSlide() {
  if (currentSlide < slides.length - 1) { currentSlide++; renderSlide(currentSlide); window.scrollTo(0,0); }
}
function prevSlide() {
  if (currentSlide > 0) { currentSlide--; renderSlide(currentSlide); window.scrollTo(0,0); }
}

function selectAnswer(qIdx, optionIdx) {
  answers[qIdx] = optionIdx;
  renderSlide(currentSlide);
}

function restartTraining() {
  answers = [null, null, null, null];
  currentSlide = 0;
  renderSlide(0);
  window.scrollTo(0,0);
}

renderSlide(0);
</script>
<footer class="site-footer">
  <span>🔒 Training prepared by</span>
  <strong>Corepath IT Consulting</strong>
  <span class="footer-divider">·</span>
  <span>Cybersecurity Awareness Programme</span>
  <span class="footer-divider">·</span>
  <span>Confidential — Internal Use Only</span>
</footer>
</body>
